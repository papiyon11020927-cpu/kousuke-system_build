name: Build & Deploy to Firebase Hosting

on:
  push:
    branches:
      - main   # main ブランチへの push で自動実行

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest   # Linux 環境（Windows スタック問題なし）

    steps:
      - name: コードを取得
        uses: actions/checkout@v5   # Node.js 24 対応版

      - name: Node.js セットアップ
        uses: actions/setup-node@v6  # Node.js 24 対応版
        with:
          node-version: '22'

      - name: 依存パッケージインストール
        working-directory: app
        run: |
          rm -f package-lock.json
          npm install

      - name: TypeScript チェック & ビルド
        working-directory: app
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY:              ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:          ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:           ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:       ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID:  ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:               ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_APP_ID:                        ${{ secrets.VITE_APP_ID }}
          # VITE_GEMINI_API_KEY は不要（Gemini は Cloud Functions 経由に移行済み）

      - name: Firebase CLI インストール
        run: npm install -g firebase-tools@15.19.0
        # バージョン固定: 15.20+ は Gen1 関数への cpu 設定を拒否するため

      - name: Firebase にデプロイ（Hosting + Storage + Firestore ルール）
        run: firebase deploy --only hosting,storage,firestore:rules --token ${{ secrets.FIREBASE_TOKEN }}
        # Functions は変更時のみ手動デプロイ: firebase deploy --only functions
